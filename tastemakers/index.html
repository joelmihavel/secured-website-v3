<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/flent_logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Share Flent. Earn Taste.</title>
    <meta
      name="description"
      content="Your network knows good homes when they see them. Get them to Flent, and get rewarded with access to Bangalore's best. Up to ₹1 lakh worth."
    />

    <!-- Open Graph — https://www.flent.in/tastemakers/images/Meta%20Image%202.png . Override at build: VITE_OG_IMAGE_URL. -->
    <meta property="og:type" content="website" />
    <meta
      property="og:title"
      content="Share Flent. Earn Taste."
    />
    <meta
      property="og:description"
      content="Your network knows good homes when they see them. Get them to Flent, and get rewarded with access to Bangalore's best. Up to ₹1 lakh worth."
    />
    <!-- __OG_IMAGE_URL__ → absolute URL at build on Vercel (VERCEL_URL) or VITE_SITE_ORIGIN -->
    <meta property="og:image" content="__OG_IMAGE_URL__" />
    <meta property="og:image:secure_url" content="__OG_IMAGE_URL__" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Flent Tastemaker Program — You're invited." />

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Share Flent. Earn Taste."
    />
    <meta
      name="twitter:description"
      content="Your network knows good homes when they see them. Get them to Flent, and get rewarded with access to Bangalore's best. Up to ₹1 lakh worth."
    />
    <meta name="twitter:image" content="__OG_IMAGE_URL__" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
