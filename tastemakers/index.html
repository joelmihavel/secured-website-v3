<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/flent_logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Make Your Taste Work for You. Join the Tastemakers Club. Get Access to Bangalore's Best.</title>
    <meta
      name="description"
      content="Your influence is real. Now it's rewarding too. Get access to up to ₹ 1 lakh of Bangalore's best homes — Flent's search for Tastemakers."
    />

    <!-- Open Graph — default `public/images/Meta Image 2.png` (invite ticket art). Override: VITE_OG_IMAGE. -->
    <meta property="og:type" content="website" />
    <meta
      property="og:title"
      content="Make Your Taste Work for You. Join the Tastemakers Club. Get Access to Bangalore's Best."
    />
    <meta
      property="og:description"
      content="Your influence is real. Now it's rewarding too. Get access to up to ₹ 1 lakh of Bangalore's best."
    />
    <!-- __OG_IMAGE_URL__ → absolute URL at build on Vercel (VERCEL_URL) or VITE_SITE_ORIGIN -->
    <meta property="og:image" content="__OG_IMAGE_URL__" />
    <meta property="og:image:secure_url" content="__OG_IMAGE_URL__" />
    <meta property="og:image:alt" content="Flent Tastemaker Program — You're invited." />

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Make Your Taste Work for You. Join the Tastemakers Club. Get Access to Bangalore's Best."
    />
    <meta
      name="twitter:description"
      content="Your influence is real. Now it's rewarding too. Get access to up to ₹ 1 lakh of Bangalore's best."
    />
    <meta name="twitter:image" content="__OG_IMAGE_URL__" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
